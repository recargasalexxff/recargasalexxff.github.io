<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Panel Administrador</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#111827,#000);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.card{

width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(35px);

border-radius:35px;

padding:35px;

border:1px solid rgba(255,255,255,.12);

box-shadow:0 25px 60px rgba(0,0,0,.4);

color:white;

}

h1{

font-size:30px;

text-align:center;

margin-bottom:30px;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:15px;

outline:none;

margin-top:15px;

font-size:16px;

}

button{

width:100%;

padding:16px;

margin-top:20px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:17px;

font-weight:bold;

background:#007AFF;

color:white;

transition:.25s;

}

button:hover{

transform:scale(.98);

}

#panel{

display:none;

}

.switch{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:30px;

padding:18px;

border-radius:20px;

background:rgba(255,255,255,.08);

}

textarea{

width:100%;

height:130px;

margin-top:20px;

padding:15px;

border-radius:18px;

resize:none;

font-size:15px;

}

.estado{

font-size:18px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<div id="login">

<h1>🔐 Panel Administrador</h1>

<input
type="password"
id="password"
placeholder="Contraseña">

<button onclick="entrar()">

Ingresar

</button>

</div>

<div id="panel">

<h1>⚙️ TiendaEsteban</h1>

<div class="switch">

<span class="estado">

Estado

</span>

<button
id="estadoBtn"
onclick="cambiarEstado()">

🟢 ACTIVA

</button>

</div>

<textarea
id="mensaje">

🚧 Estamos realizando mejoras.

Volveremos muy pronto ❤️

</textarea>

<button
onclick="guardar()">

Guardar Cambios

</button>

</div>

</div>

<script>

const PASSWORD="123456";

function entrar(){

const p=document.getElementById("password").value;

if(p===PASSWORD){

document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";

cargar();

}else{

alert("Contraseña incorrecta");

}

}

let mantenimiento=false;

function cambiarEstado(){

mantenimiento=!mantenimiento;

document.getElementById("estadoBtn").innerHTML=

mantenimiento?

"🔴 MANTENIMIENTO":

"🟢 ACTIVA";

}

function guardar(){

localStorage.setItem("mantenimiento",mantenimiento);

localStorage.setItem(

"mensaje",

document.getElementById("mensaje").value

);

alert("Configuración guardada.");

}

function cargar(){

const estado=localStorage.getItem("mantenimiento");

const mensaje=localStorage.getItem("mensaje");

if(estado==="true"){

mantenimiento=true;

document.getElementById("estadoBtn").innerHTML="🔴 MANTENIMIENTO";

}

if(mensaje){

document.getElementById("mensaje").value=mensaje;

}

}

</script>

</body>

</html>
