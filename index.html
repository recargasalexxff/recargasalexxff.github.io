<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban 4K | iOS Style</title>
    <style>
        :root { 
            --bg-body: #000; 
            --glass: rgba(255, 255, 255, 0.1); 
            --ios-blue: #007AFF; 
            --text-main: #fff; 
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); }
        .container { width: 90%; max-width: 400px; margin: 50px auto; }
        
        /* Estilo Glassmorphism (Tipo iOS) */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; 
            border-radius: 25px; 
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        /* Efecto FaceID */
        .face-id-pulse { 
            animation: pulse 1.5s infinite; 
            border: 2px solid var(--ios-blue) !important; 
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0px var(--ios-blue); } 
            50% { box-shadow: 0 0 20px var(--ios-blue); } 
            100% { box-shadow: 0 0 0px var(--ios-blue); } 
        }

        input { background: rgba(255,255,255,0.05); border: none; padding: 15px; width: 100%; border-radius: 12px; color: white; margin: 10px 0; box-sizing: border-box; }
        .btn-action { background: var(--ios-blue); border: none; padding: 15px; width: 100%; border-radius: 15px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        h3 { font-weight: 600; letter-spacing: -0.5px; }
        #seccionRecarga, #seccionPago { display: none; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWLQaTQXt6DFHHf1S_-shcNdIaLpwXeoo",
            authDomain: "esteban-4k.firebaseapp.com",
            projectId: "esteban-4k",
            storageBucket: "esteban-4k.firebasestorage.app",
            messagingSenderId: "319790003304",
            appId: "1:319790003304:web:b84b2458213686b3e0b7dd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.iniciarSesion = async () => {
            const id = document.getElementById('idInput').value;
            const card = document.getElementById('seccionLogin');
            if (/^\d{5,12}$/.test(id)) {
                card.classList.add('face-id-pulse'); // Activa el efecto iOS
                await addDoc(collection(db, "jugadores"), { id: id, fecha: new Date() });
                setTimeout(() => {
                    card.style.display = 'none';
                    document.getElementById('seccionRecarga').style.display = 'block';
                }, 2000);
            } else { alert("ID inválido"); }
        };

        window.seleccionarPack = (precio) => {
            document.getElementById('precioTotal').innerText = "Total: $" + precio;
            document.getElementById('seccionRecarga').style.display = 'none';
            document.getElementById('seccionPago').style.display = 'block';
        };

        window.finalizar = () => {
            const ref = document.getElementById('refPago').value;
            if (ref.length < 5) { alert("Ingresa referencia"); return; }
            window.open(`https://wa.me/584126701585?text=Pago%20de%20referencia:%20${ref}`, '_blank');
        };
    </script>
</head>
<body>

<div class="container">
    <div id="seccionLogin" class="card">
        <h3>Autenticación ID</h3>
        <input type="text" id="idInput" placeholder="ID de Jugador">
        <button class="btn-action" onclick="iniciarSesion()">Verificar con FaceID</button>
    </div>

    <div id="seccionRecarga" class="card">
        <h3>Selecciona el Pack</h3>
        <div onclick="seleccionarPack('0.99')" style="padding:15px; border-bottom:1px solid #333">💎 100 Diamantes - $0.99</div>
        <div onclick="seleccionarPack('2.99')" style="padding:15px; border-bottom:1px solid #333">💎 310 Diamantes - $2.99</div>
        <div onclick="seleccionarPack('4.99')" style="padding:15px;">💎 520 Diamantes - $4.99</div>
    </div>

    <div id="seccionPago" class="card">
        <h3>Pago PayPal</h3>
        <input type="text" id="refPago" placeholder="N° Referencia">
        <h2 id="precioTotal"></h2>
        <button class="btn-action" onclick="finalizar()">Pagar</button>
    </div>
</div>

</body>
</html>
